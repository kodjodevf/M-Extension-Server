name: CI Publish

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check_wrapper:
    name: Validate Gradle Wrapper
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

  build-macos:
    name: Build macOS (.dmg)
    needs: check_wrapper
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Generate android.jar
        run: bash ./AndroidCompat/getAndroid.sh

      - name: Build macOS bundle and DMG
        run: |
          chmod +x ./package_mac.sh
          ./package_mac.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundles
          path: |
            dist/MExtensionServer.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows (.zip + .exe)
    needs: check_wrapper
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Install zip (Windows)
        run: choco install zip -y
        shell: powershell

      - name: Generate android.jar
        run: bash ./AndroidCompat/getAndroid.sh
        shell: bash

      - name: Build Windows bundle
        run: |
          powershell -ExecutionPolicy Bypass -File ".\package_windows.ps1" -BuildInstaller
        shell: powershell

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundles
          path: |
            dist/MExtensionServer*-setup-x64.exe
            dist/MExtensionServer-Windows-x64.zip
          if-no-files-found: error

  build-linux:
    name: Build Linux (.tar.gz + deb + AppImage)
    needs: check_wrapper
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Generate android.jar
        run: bash ./AndroidCompat/getAndroid.sh

      - name: Install AppImage dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Build Linux bundle
        run: |
          chmod +x ./package_linux.sh
          ./package_linux.sh
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: |
            dist/*.tar.gz
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-bundles
          path: release/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-bundles
          path: release/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-bundles
          path: release/linux

      - name: Rename and organize artifacts
        shell: bash
        run: |
          cd release
          mkdir -p final

          # macOS
          if [ -f "macos/MExtensionServer.dmg" ]; then
            mv macos/MExtensionServer.dmg final/MExtensionServer-macOS.dmg
          fi

          # Windows
          if [ -f "windows/MExtensionServer-Windows-x64.zip" ]; then
            mv windows/MExtensionServer-Windows-x64.zip final/MExtensionServer-Windows-x64.zip
          fi
          # Add the .exe installer
          EXE_FILE=$(find windows -name "MExtensionServer*-setup-x64.exe" | head -n 1)
          if [ -n "$EXE_FILE" ]; then
            mv "$EXE_FILE" final/MExtensionServer-Windows-Setup.exe
          fi

          # Linux
          if [ -f "linux/MExtensionServer-Linux-x64.tar.gz" ]; then
            mv linux/MExtensionServer-Linux-x64.tar.gz final/MExtensionServer-Linux-x64.tar.gz
          fi
          if [ -f "linux/MExtensionServer-x86_64.AppImage" ]; then
            mv linux/MExtensionServer-x86_64.AppImage final/MExtensionServer-x86_64.AppImage
          fi
          # Add the .deb package
          DEB_FILE=$(find linux -name "*.deb" | head -n 1)
          if [ -n "$DEB_FILE" ]; then
            mv "$DEB_FILE" final/MExtensionServer-Linux.deb
          fi

          ls -la final/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: release/final/*
          draft: false
          prerelease: false
